<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alacena - Buscador de Recetas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fondo: '#162526',
                        cristal: '#2C3E40',
                        texto: '#E4F1F2',
                        acento: '#94A6A6'
                    },
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                        titulo: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Alacena">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/2C3E40/E4F1F2?text=Alacena">
    
    <meta name="theme-color" content="#0D1117">
</head>
<body class="bg-fondo text-texto font-sans min-h-screen p-6">

    <main class="max-w-md mx-auto mt-10">
        
        <h1 class="font-titulo text-4xl mb-2">Mi Alacena</h1>
        <p class="text-acento mb-6">¿Qué ingredientes tienes hoy?</p>

        <div class="flex gap-2 mb-6">
            <input type="text" id="input-ingrediente" 
                   class="w-full bg-cristal/30 border border-acento/30 rounded-2xl px-5 py-4 text-texto placeholder-texto/50 focus:outline-none focus:border-acento transition-colors backdrop-blur-sm shadow-inner" 
                   placeholder="Escribe un ingrediente (Ej. pollo, tomate, tortilla...)">
            
            <button id="btn-agregar" 
                    class="bg-acento text-fondo px-6 py-4 rounded-2xl font-bold hover:bg-acento/80 transition-colors shadow-lg flex items-center justify-center font-titulo text-xl">
                +
            </button>
        </div>

        <div id="contenedor-tags" class="flex flex-wrap gap-2 mb-8">
            </div>

        <div id="contenedor-recetas" class="grid gap-5">
            </div>

        <div id="modal-receta" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
            <div id="modal-contenido" class="bg-cristal/90 backdrop-blur-2xl border border-acento/40 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300">
                </div>
        </div>

    </main>

    <script src="app.js"></script>

</body>
<section id="pantalla-receta-completa" class="fixed inset-0 bg-fondo z-40 hidden opacity-0 transition-all duration-300 overflow-y-auto p-6">
        <div class="max-w-md mx-auto mt-6">
            <button id="btn-regresar" class="flex items-center gap-2 text-acento hover:text-texto mb-6 transition-colors font-titulo">
                ← Volver a la Alacena
            </button>

            <div id="detalle-receta-completa">
                </div>
        </div>
    </section>
</html>
